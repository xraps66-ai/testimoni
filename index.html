    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: radial-gradient(circle at top, #0f2027, #000000);
    color: #00ffff;
    text-align: center;
    padding: 20px;
}

h1 {
    font-size: 28px;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
}

.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    max-width: 500px;
    margin: auto;
}

.card {
    background: rgba(0,0,0,0.6);
    border-radius: 12px;
    padding: 10px;
    border: 1px solid #00ffff55;
    box-shadow: 0 0 10px #00ffff33;
    transition: 0.3s;
    position: relative;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff55;
}

.card img {
    width: 100%;
    border-radius: 8px;
}

.name {
    margin-top: 6px;
    font-size: 13px;
    text-shadow: 0 0 5px #00ffff;
}

.btn {
    display: inline-block;
    margin-top: 8px;
    padding: 8px 14px;
    border: 1px solid #00ffff;
    color: #00ffff;
    border-radius: 6px;
    text-decoration: none;
    font-size: 13px;
    transition: 0.3s;
    position: relative;
    z-index: 10;
    pointer-events: auto !important;
}

.btn:hover {
    background: #00ffff;
    color: black;
    box-shadow: 0 0 15px #00ffff, 0 0 25px #00ffff;
}

.watermark {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    color: #00ffff;
    opacity: 0.8;
    text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
    pointer-events: none;
}
</style>

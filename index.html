<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimoni RapsX V13</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: radial-gradient(circle at top, #2a1b4a, #0f001a);
            color: #e0b3ff;
            text-align: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #c026d3, 0 0 20px #c026d3;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            border: 1px solid rgba(192, 38, 211, 0.3);
            transition: all 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(192, 38, 211, 0.3);
        }

        .card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #c026d3;
            margin-bottom: 15px;
        }

        .card h3 {
            color: #f0c4ff;
            margin-bottom: 5px;
        }

        .card p {
            font-size: 15px;
            line-height: 1.6;
            opacity: 0.9;
        }

        /* Responsif untuk HP */
        @media (max-width: 600px) {
            .container {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <h1>Testimoni RapsX V13</h1>

    <div class="container">

        <!-- Testimoni 1 -->
        <div class="card">
            <img src="Screenshot_20260624_123438.jpg" alt="User 1">
            <h3>@username1</h3>
            <p>"RapsX V13 gila banget! Fitur barunya bikin kerjaan jadi jauh lebih cepat. Recommended!"</p>
        </div>

        <!-- Testimoni 2 -->
        <div class="card">
            <img src="images/testi2.jpg" alt="User 2">
            <h3>@username2</h3>
            <p>"Desainnya clean, performanya kenceng. Udah pakai dari V10 sampai sekarang V13, semakin mantap!"</p>
        </div>

        <!-- Tambahkan testimoni lain di sini -->

    </div>

</body>
</html>

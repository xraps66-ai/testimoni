<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimoni RapsX V13</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top, #2a1b4a, #0f001a);
            color: #e0b3ff;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            padding: 30px 12px;
            min-height: 100vh;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #c026d3, #e0b3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(192, 38, 211, 0.5);
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* selalu 2 kolom */
            gap: 16px;
            max-width: 700px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 18px 10px;
            text-align: center;
            border: 1px solid rgba(192, 38, 211, 0.3);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(192, 38, 211, 0.35);
        }

        .card h3 {
            color: #f0c4ff;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .card img {
            width: 100%;
            max-width: 140px;
            aspect-ratio: 9 / 16;
            object-fit: cover;
            border: 3px solid #c026d3;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(192, 38, 211, 0.5);
            margin: 0 auto;
            display: block;
            transition: transform 0.3s ease;
        }

        .card img:hover {
            transform: scale(1.05);
        }

    </style>
</head>
<body>

    <h1>Testimoni RapsX V13</h1>

    <div class="container">

        <div class="card">
            <h3>@username1</h3>
            <img src="Screenshot_20260624_123438.jpg" alt="User 1">
        </div>

        <div class="card">
            <h3>@username2</h3>
            <img src="images/testi2.jpg" alt="User 2">
        </div>

        <div class="card">
            <h3>@username3</h3>
            <img src="images/testi3.jpg" alt="User 3">
        </div>

        <div class="card">
            <h3>@username4</h3>
            <img src="images/testi4.jpg" alt="User 4">
        </div>

        <div class="card">
            <h3>@username5</h3>
            <img src="images/testi5.jpg" alt="User 5">
        </div>

        <div class="card">
            <h3>@username6</h3>
            <img src="images/testi6.jpg" alt="User 6">
        </div>

    </div>

</body>
</html>
